<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

    <!-- 배경 -->
    <rect width="100%" height="100%" fill="white"/>

    <!-- 바깥 원 -->
    <circle cx="200" cy="200" r="180" fill="#f5e6c8"/>

    <!-- 골프채 -->
    <g transform="rotate(-45 200 200)">
        <rect x="195" y="40" width="6" height="200" fill="#333"/>
        <ellipse cx="198" cy="40" rx="14" ry="10" fill="#555"/>
    </g>

    <g transform="rotate(45 200 200)">
        <rect x="195" y="40" width="6" height="200" fill="#333"/>
        <ellipse cx="198" cy="40" rx="14" ry="10" fill="#555"/>
    </g>

    <!-- 골프공 -->
    <circle cx="200" cy="200" r="90" fill="white" stroke="#ccc" stroke-width="2"/>

    <!-- 골프공 딤플 -->
    <g fill="#ddd">
        <circle cx="200" cy="140" r="3"/>
        <circle cx="240" cy="160" r="3"/>
        <circle cx="160" cy="160" r="3"/>
        <circle cx="260" cy="200" r="3"/>
        <circle cx="140" cy="200" r="3"/>
        <circle cx="240" cy="240" r="3"/>
        <circle cx="160" cy="240" r="3"/>
        <circle cx="200" cy="260" r="3"/>

        <!-- 추가 딤플 -->
        <circle cx="220" cy="180" r="2.5"/>
        <circle cx="180" cy="180" r="2.5"/>
        <circle cx="220" cy="220" r="2.5"/>
        <circle cx="180" cy="220" r="2.5"/>
        <circle cx="200" cy="200" r="2.5"/>
    </g>

    <!-- 텍스트 스타일 -->
    <style>
        .title {
        font-family: Impact, Arial Black, sans-serif;
        font-size: 42px;
        fill: #000;
        stroke: #FD5A1E;
        stroke-width: 2;
        text-anchor: middle;
        }
        .sub {
        font-family: sans-serif;
        font-size: 18px;
        fill: #000;
        text-anchor: middle;
        }
    </style>

    <!-- 텍스트 -->
    <text x="200" y="80" class="sub">GOLF CLUB</text>
    <text x="200" y="210" class="title">S.FRIENDS</text>
    <text x="200" y="340" class="sub">SINCE 2025</text>

</svg>